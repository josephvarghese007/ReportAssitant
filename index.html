<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>BusTech Engineering · Bus PDI Road Test</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Font & Icons (kept here for simplicity) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

    <!-- HEADER -->
    <header class="app-header">
        <div class="top-row">
            <div class="brand">
                <i class="fas fa-bus"></i>
                <div class="brand-text">
                    <span class="company-name">BusTech Engineering</span>
                    <span class="app-name">PDI Road Test</span>
                </div>
            </div>
            <div class="header-actions">
                <button onclick="scanQR()" title="Scan QR" aria-label="Scan QR code"><i class="fas fa-qrcode"></i></button>
                <button onclick="toggleDarkMode()" title="Theme" aria-label="Toggle theme"><i class="fas fa-moon"></i></button>
            </div>
        </div>
        <div class="subtitle">
            <i class="fas fa-clipboard-check"></i>
            Chassis Level-2 · Grouped Inspection
        </div>
    </header>

    <!-- STATS -->
    <section class="stats-grid" id="statsGrid" aria-live="polite" role="status">
        <div class="stat-item">
            <div class="stat-number total" id="totalCount">0</div>
            <div class="stat-label">Total</div>
        </div>
        <div class="stat-item">
            <div class="stat-number passed" id="passedCount">0</div>
            <div class="stat-label">Passed</div>
        </div>
        <div class="stat-item">
            <div class="stat-number failed" id="failedCount">0</div>
            <div class="stat-label">Failed</div>
        </div>
        <div class="stat-item">
            <div class="stat-number pending" id="pendingCount">0</div>
            <div class="stat-label">Pending</div>
        </div>
    </section>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <div class="search-wrap">
            <i class="fas fa-search" aria-hidden="true"></i>
            <input type="text" id="searchInput" placeholder="Search assemblies..." autocomplete="off" aria-label="Search assemblies" />
        </div>
        <div class="filter-tabs" id="filterTabs" role="tablist" aria-label="Filter inspection groups">
            <button type="button" class="tab active" data-filter="all" aria-pressed="true">All</button>
            <button type="button" class="tab" data-filter="pass" aria-pressed="false">Pass</button>
            <button type="button" class="tab" data-filter="fail" aria-pressed="false">Fail</button>
            <button type="button" class="tab" data-filter="pending" aria-pressed="false">Pending</button>
        </div>
    </div>

    <!-- GROUP LIST -->
    <div class="group-list" id="groupList"></div>

    <!-- BOTTOM BAR -->
    <div class="bottom-bar">
        <button type="button" class="btn-outline" onclick="exportPDF()" aria-label="Export PDF"><i class="fas fa-file-pdf" aria-hidden="true"></i> PDF</button>
        <button type="button" class="btn-outline" onclick="exportCSV()" aria-label="Export CSV"><i class="fas fa-file-excel" aria-hidden="true"></i> CSV</button>
        <button type="button" class="btn-primary" onclick="saveJSON()" aria-label="Save inspection data"><i class="fas fa-save" aria-hidden="true"></i> Save</button>
        <button type="button" class="btn-outline" onclick="document.getElementById('importJsonInput').click()" aria-label="Load saved JSON file">
            <i class="fas fa-upload" aria-hidden="true"></i> Load
        <input type="file" id="importJsonInput" accept=".json" onchange="importJSON(event)" />
    </div>

    <!-- TOAST & MODAL -->
    <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalMessage">
            <h2 id="modalTitle">Confirm Fail</h2>
            <p id="modalMessage">Marking as <strong>FAIL</strong>. Please ensure you capture a photo as evidence.</p>
            <div class="modal-actions">
                <button class="btn-outline" onclick="closeModal()">Cancel</button>
                <button class="btn-danger" id="modalConfirmBtn">Confirm Fail</button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="script.js"></script>
</body>
</html>
