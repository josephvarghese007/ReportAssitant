<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Bus PDI · Grouped Road Test</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Font & Icons (kept here for simplicity) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

    <!-- HEADER -->
    <header class="app-header">
        <div class="top-row">
            <div class="brand">
                <i class="fas fa-bus"></i>
                <span>PDI Road Test</span>
            </div>
            <div class="header-actions">
                <button onclick="scanQR()" title="Scan QR"><i class="fas fa-qrcode"></i></button>
                <button onclick="toggleDarkMode()" title="Theme"><i class="fas fa-moon"></i></button>
            </div>
        </div>
        <div class="subtitle">
            <i class="fas fa-clipboard-check"></i>
            Chassis Level-2 · Grouped Inspection
        </div>
    </header>

    <!-- STATS -->
    <section class="stats-grid" id="statsGrid">
        <div class="stat-item">
            <div class="stat-number total" id="totalCount">0</div>
            <div class="stat-label">Total</div>
        </div>
        <div class="stat-item">
            <div class="stat-number passed" id="passedCount">0</div>
            <div class="stat-label">Passed</div>
        </div>
        <div class="stat-item">
            <div class="stat-number failed" id="failedCount">0</div>
            <div class="stat-label">Failed</div>
        </div>
        <div class="stat-item">
            <div class="stat-number pending" id="pendingCount">0</div>
            <div class="stat-label">Pending</div>
        </div>
    </section>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <div class="search-wrap">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search assemblies..." autocomplete="off" />
        </div>
        <div class="filter-tabs" id="filterTabs">
            <button class="tab active" data-filter="all">All</button>
            <button class="tab" data-filter="pass">Pass</button>
            <button class="tab" data-filter="fail">Fail</button>
            <button class="tab" data-filter="pending">Pending</button>
        </div>
    </div>

    <!-- GROUP LIST -->
    <div class="group-list" id="groupList"></div>

    <!-- BOTTOM BAR -->
    <div class="bottom-bar">
        <button class="btn-outline" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
        <button class="btn-outline" onclick="exportCSV()"><i class="fas fa-file-excel"></i> CSV</button>
        <button class="btn-primary" onclick="saveJSON()"><i class="fas fa-save"></i> Save</button>
        <button class="btn-outline" onclick="document.getElementById('importJsonInput').click()">
            <i class="fas fa-upload"></i> Load
        </button>
        <input type="file" id="importJsonInput" accept=".json" onchange="importJSON(event)" />
    </div>

    <!-- TOAST & MODAL -->
    <div class="toast-container" id="toastContainer"></div>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle">Confirm Fail</h2>
            <p id="modalMessage">Marking as <strong>FAIL</strong>. Please ensure you capture a photo as evidence.</p>
            <div class="modal-actions">
                <button class="btn-outline" onclick="closeModal()">Cancel</button>
                <button class="btn-danger" id="modalConfirmBtn">Confirm Fail</button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="app.js"></script>
</body>
</html>
